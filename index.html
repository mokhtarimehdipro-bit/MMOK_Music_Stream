<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>MMOK Music Stream</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      /* Nouveau Thème : Noir pur et Indigo profond */
      --bg-black: #000000;
      --bg-gradient: linear-gradient(180deg, #000000 0%, #050a15 70%, #16123a 100%);
      --surface-metal: rgba(25, 25, 35, 0.4);
      --border-indigo: rgba(106, 90, 205, 0.2);
      --text-main: #FFFFFF;
      --text-secondary: #8E8E93;
      --accent: #6a5acd; /* Indigo */
      --accent-glow: 0 0 15px rgba(106, 90, 205, 0.3);
    }

    body { 
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: var(--bg-black); background-image: var(--bg-gradient); color: var(--text-main); 
      position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; display: flex; flex-direction: column; overflow: hidden; 
    }
    
    #auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-black); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .app-wrapper { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR & NAV */
    .sidebar { width: 240px; background: rgba(0,0,0,0.6); padding: 24px 12px; display: flex; flex-direction: column; border-right: 1px solid var(--border-indigo); }
    .logo { font-size: 1.5rem; font-weight: 800; margin: 0 0 30px 12px; letter-spacing: 1px; }
    .logo span { color: var(--accent); }

    .nav-menu { list-style: none; padding: 0; margin: 0; }
    .nav-item { padding: 12px; color: var(--text-secondary); font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
    .nav-item:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .nav-item.active { color: var(--text-main); background: rgba(106, 90, 205, 0.15); border-left: 3px solid var(--accent); }
    
    .sync-btn { margin-top: 10px; color: var(--text-secondary); font-size: 0.8rem; text-align: center; border: 1px solid var(--border-indigo); padding: 8px; border-radius: 20px; cursor: pointer; }

    /* MAIN VIEW */
    .main-view { flex: 1; background: var(--surface-metal); margin: 10px; border-radius: 12px; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; border: 1px solid var(--border-indigo); }
    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; position: sticky; top: -20px; z-index: 10; padding: 10px 0; background: rgba(0,0,0,0.01); }
    .search-bar { width: 300px; padding: 10px 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border-indigo); border-radius: 20px; color: white; outline: none; }

    /* BROWSE VIEW (Dossiers) */
    .browse-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; transition: 0.2s; }
    .browse-item:hover { background: rgba(255,255,255,0.03); }
    .browse-icon { font-size: 1.2rem; margin-right: 15px; width: 24px; text-align: center; }
    .browse-name { flex: 1; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* TRACK LIST */
    .track-list { width: 100%; border-collapse: collapse; }
    .track-item { cursor: pointer; }
    .track-item:hover { background: rgba(255,255,255,0.03); }
    .track-item td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.9rem; }
    .track-item.playing { color: var(--accent); font-weight: bold; }

    /* PLAYER BAR */
    .player-bar { height: 100px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border-indigo); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; padding-bottom: env(safe-area-inset-bottom); }
    .now-playing { display: flex; align-items: center; width: 30%; }
    #bottom-cover { width: 50px; height: 50px; background: #111; border-radius: 6px; background-size: cover; }
    .np-info { margin-left: 12px; overflow: hidden; }
    .np-title { display: block; font-size: 0.9rem; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    .np-artist { font-size: 0.8rem; color: var(--text-secondary); }

    .player-controls { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 10px; }
    .ctrl-btns { display: flex; align-items: center; gap: 20px; }
    .btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; }
    .btn-play { background: white; color: black; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .btn.active { color: var(--accent); }

    .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

    /* MOBILE ADAPTATION */
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: 60px; flex-direction: row; padding: 0 10px; position: fixed; top: 0; z-index: 100; border-right: none; }
      .nav-menu { flex-direction: row; width: 100%; justify-content: space-around; }
      .nav-item { margin: 0; font-size: 0.7rem; flex-direction: column; gap: 2px; padding: 5px; border-left: none !important; }
      .nav-item.active { border-bottom: 2px solid var(--accent); background: none; }
      .logo, .sync-btn, .sync-status { display: none; }
      .main-view { margin: 70px 0 100px 0; border-radius: 0; border: none; }
      .player-bar { position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
      .search-bar { width: 100%; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="auth-overlay">
    <h1 style="font-size: 2rem; margin-bottom: 20px;">MMOK<span>Music</span></h1>
    <button id="login-btn" style="padding: 15px 40px; background: var(--accent); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer;">Connecter Drive</button>
  </div>

  <div class="app-wrapper">
    <aside class="sidebar">
      <div class="logo">MMOK <span>Music</span></div>
      <ul class="nav-menu">
        <li class="nav-item active" id="nav-home">🏠 Accueil</li>
        <li class="nav-item" id="nav-browse">📂 Parcourir</li>
        <li class="nav-item" id="nav-all">🎵 Titres <span id="total-count" style="font-size: 0.8em; opacity: 0.5;"></span></li>
      </ul>
      <div class="sync-btn" id="force-scan-btn">Actualiser l'index</div>
      <div id="sync-status" class="sync-status" style="font-size: 10px; color: var(--text-secondary); text-align: center; margin-top: 10px;"></div>
    </aside>

    <main class="main-view">
      <div class="header-actions">
        <input type="text" id="search-bar" class="search-bar" placeholder="Rechercher...">
        <div id="view-title" class="view-title" style="font-weight: bold;">Lecteur</div>
      </div>

      <div id="home-container" class="home-view" style="text-align: center; margin-top: 50px;">
        <div id="home-cover" style="width: 250px; height: 250px; background: #111; margin: 0 auto 30px; border-radius: 12px; background-size: cover; box-shadow: var(--accent-glow);"></div>
        <h2 id="home-title">Bienvenue</h2>
        <p id="home-artist" style="color: var(--text-secondary);">Choisissez une musique</p>
      </div>

      <div id="list-container" class="hidden">
        <div id="browse-back" class="browse-item hidden" style="color: var(--accent); font-weight: bold;">
          <span class="browse-icon">⬅️</span> Retour
        </div>
        <div id="list-content"></div>
      </div>
    </main>
  </div>

  <footer class="player-bar">
    <div class="now-playing" id="go-to-home">
      <div id="bottom-cover"></div>
      <div class="np-info">
        <span class="np-title" id="bottom-title">Prêt à lire</span>
        <span class="np-artist" id="bottom-artist">MMOK Stream</span>
      </div>
    </div>

    <div class="player-controls">
      <div class="ctrl-btns">
        <button class="btn" id="btn-prev">⏮️</button>
        <button class="btn btn-play" id="btn-play">▶️</button>
        <button class="btn" id="btn-next">⏭️</button>
        <button class="btn" id="btn-loop">🔁</button>
      </div>
      <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div style="display: flex; justify-content: space-between; width: 100%; font-size: 10px; color: var(--text-secondary); margin-top: 5px;">
        <span id="time-curr">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>
    <div style="width: 30%;"></div>
    <audio id="main-audio"></audio>
  </footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script type="module">
    import Dexie from 'https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.mjs';

    // 1. CONFIGURATION PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    const CLIENT_ID = '1024256563119-m0on1undnhbs4tlpe0cih60mnl6arep6.apps.googleusercontent.com';
    let accessToken = localStorage.getItem('mmok_token');
    let tokenClient;

    const db = new Dexie('MMOKMusicDB');
    db.version(4).stores({ tracks: 'id, title, artist, album, cover, driveFileId', syncState: 'key, value' });

    // ETAT DE L'APPLI
    let currentPlaylist = [];
    let currentIndex = -1;
    let folderHistory = ['root'];

    // ELEMENTS UI
    const mainAudio = document.getElementById('main-audio');
    const listContent = document.getElementById('list-content');
    const viewTitle = document.getElementById('view-title');
    const homeContainer = document.getElementById('home-container');
    const listContainer = document.getElementById('list-container');
    const searchBar = document.getElementById('search-bar');

    // INITIALISATION GOOGLE DRIVE
    window.onload = () => {
      if (accessToken) { document.getElementById('auth-overlay').classList.add('hidden'); initApp(); }
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: (res) => { accessToken = res.access_token; localStorage.setItem('mmok_token', accessToken); document.getElementById('auth-overlay').classList.add('hidden'); initApp(); }
      });
    };
    document.getElementById('login-btn').onclick = () => tokenClient.requestAccessToken();

    async function initApp() {
      const count = await db.tracks.count();
      document.getElementById('total-count').innerText = count > 0 ? `(${count.toLocaleString()})` : '';
    }

    // NAVIGATION
    function showSection(id) {
      [homeContainer, listContainer].forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.remove('hidden');
    }

    document.getElementById('nav-home').onclick = () => { showSection('home-container'); document.getElementById('nav-home').classList.add('active'); viewTitle.innerText = "Lecteur"; };
    document.getElementById('nav-all').onclick = () => { showSection('list-container'); document.getElementById('nav-all').classList.add('active'); viewTitle.innerText = "Ma Bibliothèque"; displayLibrary(); };
    document.getElementById('nav-browse').onclick = () => { showSection('list-container'); document.getElementById('nav-browse').classList.add('active'); viewTitle.innerText = "Explorateur Drive"; browseDrive('root'); };

    // --- EXPLORATEUR DE DOSSIERS (LA NOUVEAUTÉ) ---
    async function browseDrive(folderId) {
      listContent.innerHTML = "<p style='text-align:center; padding:20px;'>Chargement des dossiers...</p>";
      document.getElementById('browse-back').classList.toggle('hidden', folderId === 'root');
      
      try {
        const q = `'${folderId}' in parents and trashed = false and (mimeType = 'application/vnd.google-apps.folder' or mimeType contains 'audio/')`;
        const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name,mimeType)&pageSize=1000&orderBy=folder,name`, {
          headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const data = await res.json();
        
        listContent.innerHTML = "";
        const folderTracks = [];

        data.files.forEach(file => {
          const div = document.createElement('div');
          div.className = "browse-item";
          const isFolder = file.mimeType === 'application/vnd.google-apps.folder';
          
          div.innerHTML = `<span class="browse-icon">${isFolder ? '📁' : '🎵'}</span><span class="browse-name">${file.name}</span>`;
          
          if (isFolder) {
            div.onclick = () => { folderHistory.push(folderId); browseDrive(file.id); };
          } else {
            const trackObj = { id: file.id, title: file.name, artist: "Fichier Drive", album: "Dossier", driveFileId: file.id };
            folderTracks.push(trackObj);
            div.onclick = () => playTrack(trackObj, folderTracks.indexOf(trackObj), folderTracks);
          }
          listContent.appendChild(div);
        });
      } catch (e) { listContent.innerHTML = "Erreur de chargement."; }
    }

    document.getElementById('browse-back').onclick = () => {
      const lastFolder = folderHistory.pop();
      browseDrive(lastFolder || 'root');
    };

    // --- BIBLIOTHEQUE INDEXÉE ---
    async function displayLibrary(search = "") {
      listContent.innerHTML = "";
      let tracks = await db.tracks.toArray();
      if (search) {
        tracks = tracks.filter(t => t.title.toLowerCase().includes(search.toLowerCase()) || t.artist.toLowerCase().includes(search.toLowerCase()));
      }
      
      const table = document.createElement('table');
      table.className = "track-list";
      tracks.slice(0, 100).forEach((t, i) => {
        const tr = document.createElement('tr');
        tr.className = "track-item";
        tr.innerHTML = `<td>${t.title}</td><td style="color:var(--text-secondary)">${t.artist}</td>`;
        tr.onclick = () => playTrack(t, i, tracks);
        table.appendChild(tr);
      });
      listContent.appendChild(table);
    }

    searchBar.oninput = (e) => {
      if (!listContainer.classList.contains('hidden')) displayLibrary(e.target.value);
    };

    // --- LOGIQUE DU LECTEUR ---
    async function playTrack(track, index, playlist) {
      currentPlaylist = playlist;
      currentIndex = index;
      
      document.getElementById('btn-play').innerText = "⏳";
      document.getElementById('bottom-title').innerText = track.title;
      document.getElementById('bottom-artist').innerText = track.artist;
      document.getElementById('home-title').innerText = track.title;
      document.getElementById('home-artist').innerText = track.artist;
      
      if (track.cover) {
        document.getElementById('home-cover').style.backgroundImage = `url('${track.cover}')`;
        document.getElementById('bottom-cover').style.backgroundImage = `url('${track.cover}')`;
      } else {
        document.getElementById('home-cover').style.backgroundImage = "";
        document.getElementById('bottom-cover').style.backgroundImage = "";
      }

      try {
        const res = await fetch(`https://www.googleapis.com/drive/v3/files/${track.driveFileId}?alt=media`, {
          headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const blob = await res.blob();
        if (mainAudio.src) URL.revokeObjectURL(mainAudio.src);
        mainAudio.src = URL.createObjectURL(blob);
        mainAudio.play();
        document.getElementById('btn-play').innerText = "⏸️";
      } catch (e) { alert("Erreur de lecture"); }
    }

    document.getElementById('btn-play').onclick = () => {
      if (mainAudio.paused) { mainAudio.play(); document.getElementById('btn-play').innerText = "⏸️"; }
      else { mainAudio.pause(); document.getElementById('btn-play').innerText = "▶️"; }
    };

    document.getElementById('btn-next').onclick = () => {
      if (currentIndex < currentPlaylist.length - 1) playTrack(currentPlaylist[currentIndex+1], currentIndex+1, currentPlaylist);
    };

    document.getElementById('btn-prev').onclick = () => {
      if (mainAudio.currentTime > 3) mainAudio.currentTime = 0;
      else if (currentIndex > 0) playTrack(currentPlaylist[currentIndex-1], currentIndex-1, currentPlaylist);
    };

    mainAudio.ontimeupdate = () => {
      const p = (mainAudio.currentTime / mainAudio.duration) * 100;
      document.getElementById('progress-bar').style.width = p + "%";
      document.getElementById('time-curr').innerText = formatTime(mainAudio.currentTime);
      document.getElementById('time-total').innerText = formatTime(mainAudio.duration);
    };

    mainAudio.onended = () => {
      if (document.getElementById('btn-loop').classList.contains('active')) { mainAudio.currentTime = 0; mainAudio.play(); }
      else document.getElementById('btn-next').click();
    };

    document.getElementById('btn-loop').onclick = () => document.getElementById('btn-loop').classList.toggle('active');

    function formatTime(s) {
      if (!s) return "0:00";
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    // SCAN (Inchangé)
    document.getElementById('force-scan-btn').onclick = async () => {
      const res = await fetch('./catalogue.json');
      const catalogue = await res.json();
      let pageToken = null;
      document.getElementById('sync-status').innerText = "Scan en cours...";
      do {
        let url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("mimeType contains 'audio/'")}&fields=nextPageToken,files(id,name)&pageSize=1000`;
        if (pageToken) url += `&pageToken=${pageToken}`;
        const response = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
        const data = await response.json();
        const tracks = data.files.map(f => {
          const meta = catalogue[f.name] || {};
          return { id: f.id, title: meta.title || f.name, artist: meta.artist || "Inconnu", album: meta.album || "Inconnu", cover: meta.cover || null, driveFileId: f.id };
        });
        await db.tracks.bulkPut(tracks);
        pageToken = data.nextPageToken;
        document.getElementById('sync-status').innerText = `Indexé : ${await db.tracks.count()}`;
      } while (pageToken);
      initApp();
    };

  </script>
</body>
</html>
