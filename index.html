<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMOK Music Stream</title>
  <style>
    /* --- THEME : Dégradé Bleu Foncé -> Indigo -> Rosé --- */
    :root {
      --bg-gradient: linear-gradient(135deg, #050a15 0%, #16123a 50%, #3a0d24 100%);
      --surface-metal: rgba(18, 18, 18, 0.6);
      --surface-hover: rgba(255, 255, 255, 0.05);
      --border-metal: rgba(255, 255, 255, 0.08);
      --text-main: #FFFFFF;
      --text-secondary: #B0B0B0;
      --neon-indigo: #6a5acd;
      --neon-rose: #ff4081;
      --glow-subtle: 0 0 15px rgba(255, 64, 129, 0.2);
    }

    body { 
      margin: 0; 
      font-family: 'Segoe UI', 'Roboto', sans-serif; 
      background: var(--bg-gradient); 
      color: var(--text-main); 
      /* LE FIX MOBILE EST ICI : Ancrage absolu aux 4 coins de l'écran */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      backdrop-filter: blur(10px); 
    }
    
    #auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-gradient); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .app-wrapper { display: flex; flex: 1; overflow: hidden; }

    /* SIDEBAR (Desktop) */
    .sidebar { width: 240px; background: rgba(0,0,0,0.4); padding: 24px 12px; display: flex; flex-direction: column; border-right: 1px solid var(--border-metal); backdrop-filter: blur(5px); }
    .logo { font-size: 2rem; font-weight: 200; margin: 0 0 30px 12px; color: #fff; letter-spacing: 2px; }
    .logo span { font-weight: 800; background: linear-gradient(90deg, var(--neon-indigo), var(--neon-rose)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: var(--glow-subtle); }

    .nav-menu { list-style: none; padding: 0; margin: 0; }
    .nav-item { padding: 12px; color: var(--text-secondary); font-weight: 600; cursor: pointer; border-radius: 6px; transition: all 0.3s ease; margin-bottom: 4px; }
    .nav-item:hover { color: var(--text-main); background: var(--surface-hover); }
    .nav-item.active { background: rgba(255, 64, 129, 0.1); border-left: 3px solid var(--neon-rose); color: var(--text-main); box-shadow: inset 10px 0 20px -10px rgba(255, 64, 129, 0.2); }
    
    .sync-btn { margin-top: 20px; color: var(--neon-rose); font-size: 0.9rem; border: 1px solid rgba(255, 64, 129, 0.3); text-align: center; }
    .sync-btn:hover { background: rgba(255, 64, 129, 0.2); color: white; box-shadow: var(--glow-subtle); }
    .sync-status { margin-top: auto; padding: 12px; font-size: 12px; color: var(--text-secondary); background: rgba(0,0,0,0.3); border-radius: 6px; text-align: center; }

    /* MAIN VIEW */
    .main-view { flex: 1; background: var(--surface-metal); border-radius: 12px; margin: 12px 12px 0 12px; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
    .main-view::-webkit-scrollbar { width: 8px; }
    .main-view::-webkit-scrollbar-track { background: transparent; }
    .main-view::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; position: sticky; top: 0; padding-bottom: 10px; z-index: 10; background: var(--bg-gradient); margin: -24px -24px 24px -24px; padding: 24px 24px 10px 24px;}
    .search-bar { width: 400px; padding: 12px 20px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-metal); border-radius: 30px; color: white; outline: none; font-size: 14px; transition: all 0.3s ease; }
    .search-bar:focus { border-color: var(--neon-indigo); box-shadow: 0 0 15px rgba(106, 90, 205, 0.3); }
    .view-title { color: var(--text-main); font-size: 1.2rem; font-weight: bold; margin-left: 15px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

    /* --- VUE : ACCUEIL (LECTEUR CENTRAL) --- */
    .home-view { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; animation: fadeIn 0.5s ease; padding-bottom: 30px;}
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    
    .home-cover { width: 320px; height: 320px; border-radius: 12px; background-color: rgba(0,0,0,0.5); background-size: cover; background-position: center; margin-bottom: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(106, 90, 205, 0.15); transition: transform 0.3s ease; }
    .home-cover:hover { transform: scale(1.02); }
    .home-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 0 20px rgba(255, 64, 129, 0.3); }
    .home-artist-album { font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 50px; font-weight: 300; }
    
    /* Barre de progression Néon */
    .progress-wrapper { width: 80%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
    .progress-time { width: 100%; display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }
    .progress-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-indigo), var(--neon-rose)); width: 0%; border-radius: 3px; box-shadow: 0 0 10px var(--neon-rose); transition: width 0.1s linear; pointer-events: none; }

    /* VUES LISTE ET GRILLE */
    .track-list { width: 100%; border-collapse: collapse; text-align: left; }
    .track-list th { color: var(--text-secondary); padding: 10px 12px; border-bottom: 1px solid var(--border-metal); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .track-item { cursor: pointer; transition: background 0.2s; }
    .track-item:hover { background: var(--surface-hover); }
    .track-item td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 14px; }
    .track-item .cover-cell { width: 40px; }
    .track-item .mini-cover { width: 36px; height: 36px; border-radius: 4px; background-color: rgba(0,0,0,0.5); background-size: cover; background-position: center; }
    .track-item .title-cell { color: var(--text-main); font-weight: 500; }
    .track-item .artist-cell { color: var(--text-secondary); }
    .track-item.playing { background: rgba(106, 90, 205, 0.1); }
    .track-item.playing .title-cell { color: var(--neon-rose); font-weight: bold; text-shadow: var(--glow-subtle); }

    .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding-bottom: 20px;}
    .grid-card { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 20px 15px; cursor: pointer; transition: all 0.3s; text-align: center; border: 1px solid transparent; backdrop-filter: blur(5px); }
    .grid-card:hover { transform: translateY(-5px); border-color: rgba(106, 90, 205, 0.4); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    .grid-icon { font-size: 3rem; margin-bottom: 15px; display: block; }
    .grid-title { color: var(--text-main); font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
    .grid-subtitle { color: var(--text-secondary); font-size: 12px; }

    /* LECTEUR DU BAS (CONTRÔLES PERSONNALISÉS) */
    .player-bar { height: 90px; background: rgba(5, 10, 21, 0.9); border-top: 1px solid var(--border-metal); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; backdrop-filter: blur(10px); }
    .now-playing { display: flex; align-items: center; width: 30%; cursor: pointer; }
    .now-playing:hover .np-title { color: var(--neon-rose); }
    #bottom-cover { width: 50px; height: 50px; background-color: rgba(0,0,0,0.5); border-radius: 4px; background-position: center; background-size: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    .now-playing-info { display: flex; flex-direction: column; margin-left: 16px; overflow: hidden; }
    .np-title { font-size: 14px; color: var(--text-main); font-weight: 600; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; transition: color 0.2s; }
    .np-artist { font-size: 12px; color: var(--text-secondary); margin-top: 4px; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
    
    .player-controls { width: 40%; display: flex; justify-content: center; align-items: center; gap: 15px; }
    .control-btn { background: none; border: none; color: var(--text-main); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; padding: 10px; outline: none; }
    .control-btn:hover { color: var(--neon-rose); transform: scale(1.1); text-shadow: var(--glow-subtle); }
    .control-btn svg { width: 24px; height: 24px; fill: currentColor; }
    
    .play-btn { background: linear-gradient(135deg, var(--neon-indigo), var(--neon-rose)); border-radius: 50%; width: 50px; height: 50px; margin: 0 10px; box-shadow: 0 0 15px rgba(255, 64, 129, 0.3); color: white; }
    .play-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--neon-rose); color: white; }
    .play-btn svg { width: 28px; height: 28px; }
    
    .active-loop { color: var(--neon-rose) !important; filter: drop-shadow(0 0 5px var(--neon-rose)); }
    
    .player-spacer { width: 30%; }
    audio { display: none; } 
    
    .hidden { display: none !important; }
    .loading-pulse { animation: pulse-text 1.5s infinite; color: var(--neon-indigo) !important; }
    @keyframes pulse-text { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

    /* ========================================= */
    /* === ADAPTATION MOBILE (SMARTPHONES) === */
    /* ========================================= */
    @media (max-width: 768px) {
      .app-wrapper { flex-direction: column; }
      .sidebar { width: 100%; padding: 10px; border-right: none; border-bottom: 1px solid var(--border-metal); flex-direction: row; align-items: center; justify-content: flex-start; overflow-x: auto; box-sizing: border-box; }
      .sidebar::-webkit-scrollbar { display: none; }
      .logo { font-size: 1.2rem; margin: 0 15px 0 0; }
      .logo br { display: none; }
      .nav-menu { display: flex; flex-direction: row; flex-shrink: 0; margin: 0; }
      .nav-item { margin-bottom: 0; margin-right: 10px; padding: 8px 12px; font-size: 0.9rem; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
      .nav-item.active { border-left: none; border-bottom: 3px solid var(--neon-rose); box-shadow: inset 0 -10px 20px -10px rgba(255, 64, 129, 0.2); }
      .sync-btn { margin-top: 0; font-size: 0.8rem; padding: 8px; white-space: nowrap; }
      .sync-status { display: none; } 
      .main-view { margin: 0; border-radius: 0; padding: 15px; }
      .header-actions { flex-direction: column-reverse; margin: -15px -15px 15px -15px; padding: 15px; gap: 15px; }
      .search-bar { width: 100%; box-sizing: border-box; }
      .view-title { margin-left: 0; align-self: flex-start; }
      .home-cover { width: 220px; height: 220px; margin-bottom: 20px; }
      .home-title { font-size: 1.6rem; }
      .home-artist-album { font-size: 1rem; margin-bottom: 30px; }
      .progress-wrapper { width: 100%; }

      /* Ajustement précis de la barre du bas pour éviter d'être coupée par Android */
      .player-bar { 
        flex-direction: column; 
        height: auto; 
        /* La magie opère ici : padding-bottom dynamique */
        padding: 10px 15px calc(15px + env(safe-area-inset-bottom)) 15px; 
        gap: 8px; 
      }
      .now-playing { width: 100%; justify-content: flex-start; }
      #bottom-cover { width: 40px; height: 40px; }
      
      .player-controls { width: 100%; gap: 10px; }
      .control-btn svg { width: 22px; height: 22px; }
      .play-btn { width: 44px; height: 44px; margin: 0 5px; }
      .play-btn svg { width: 24px; height: 24px; }
      .player-spacer { display: none; }
      
      .grid-view { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
      .grid-card { padding: 15px 10px; }
      .track-list th:nth-child(3), .track-list td:nth-child(3) { display: none; } 
    }
  </style>
</head>
<body>

  <div id="auth-overlay">
    <h1 class="logo">MMOK <span>Music</span></h1>
    <button id="login-btn" style="padding: 14px 35px; background: linear-gradient(135deg, var(--neon-indigo) 0%, var(--neon-rose) 100%); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 16px; box-shadow: var(--glow-subtle);">
      Connecter Google Drive
    </button>
  </div>

  <div class="app-wrapper">
    <aside class="sidebar">
      <h1 class="logo">MMOK <span>Music</span></h1>
      <ul class="nav-menu">
        <li class="nav-item active" id="nav-home">🏠 Accueil</li>
        <li class="nav-item" id="nav-all">🎵 Titres <span id="total-count" style="opacity: 0.7; font-size: 0.9em; margin-left: 4px;"></span></li>
        <li class="nav-item" id="nav-albums">💿 Albums</li>
        <li class="nav-item" id="nav-artists">🎤 Artistes</li>
        <li class="nav-item sync-btn" id="force-scan-btn">🔄 Actualiser Bibliothèque</li>
      </ul>
      <div id="sync-status" class="sync-status">Initialisation...</div>
    </aside>

    <main class="main-view">
      <div class="header-actions">
        <input type="text" id="search-bar" class="search-bar" placeholder="Rechercher une musique..." autocomplete="off">
        <div class="view-title" id="view-title">Lecteur</div>
      </div>

      <div id="home-container" class="home-view">
        <div id="home-cover" class="home-cover"></div>
        <div id="home-title" class="home-title">Bienvenue</div>
        <div id="home-artist-album" class="home-artist-album">Sélectionnez une piste pour commencer</div>
        
        <div class="progress-wrapper">
          <div class="progress-time">
            <span id="time-current">0:00</span>
            <span id="time-total">0:00</span>
          </div>
          <div id="progress-container" class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>
      </div>

      <table class="track-list hidden" id="table-container">
        <thead>
          <tr><th style="width: 40px;"></th><th>Titre</th><th>Artiste / Album</th></tr>
        </thead>
        <tbody id="track-table-body"></tbody>
      </table>

      <div class="grid-view hidden" id="grid-container"></div>
    </main>
  </div>

  <footer class="player-bar">
    <div class="now-playing" id="go-to-home-btn" title="Retour au lecteur">
      <div id="bottom-cover"></div>
      <div class="now-playing-info">
        <span class="np-title" id="bottom-title">MMOK Stream</span>
        <span class="np-artist" id="bottom-artist">-</span>
      </div>
    </div>
    
    <div class="player-controls">
      <button id="btn-prev" class="control-btn" title="Précédent">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      
      <button id="btn-play" class="control-btn play-btn" title="Lecture / Pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" class="hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      
      <button id="btn-next" class="control-btn" title="Suivant">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      
      <button id="btn-loop" class="control-btn" title="Boucle">
        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
      </button>
      
      <audio id="main-audio"></audio>
    </div>
    
    <div class="player-spacer"></div>
  </footer>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <script type="module">
    import Dexie from 'https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.mjs';

    const CLIENT_ID = '1024256563119-m0on1undnhbs4tlpe0cih60mnl6arep6.apps.googleusercontent.com';
    let tokenClient;
    let accessToken = localStorage.getItem('mmok_token');

    const db = new Dexie('MMOKMusicDB');
    db.version(4).stores({ tracks: 'id, title, artist, album, cover, driveFileId', syncState: 'key, value' });

    let currentPlaylist = [];
    let currentTrackIndex = -1;

    const authOverlay = document.getElementById('auth-overlay');
    const syncStatus = document.getElementById('sync-status');
    const searchBar = document.getElementById('search-bar');
    const viewTitle = document.getElementById('view-title');
    const mainAudio = document.getElementById('main-audio');
    
    const homeContainer = document.getElementById('home-container');
    const tableContainer = document.getElementById('table-container');
    const gridContainer = document.getElementById('grid-container');
    const trackTableBody = document.getElementById('track-table-body');

    const navHome = document.getElementById('nav-home');
    const navAll = document.getElementById('nav-all');
    const navAlbums = document.getElementById('nav-albums');
    const navArtists = document.getElementById('nav-artists');
    const goToHomeBtn = document.getElementById('go-to-home-btn');

    const homeCover = document.getElementById('home-cover');
    const homeTitle = document.getElementById('home-title');
    const homeArtistAlbum = document.getElementById('home-artist-album');
    const bottomCover = document.getElementById('bottom-cover');
    const bottomTitle = document.getElementById('bottom-title');
    const bottomArtist = document.getElementById('bottom-artist');
    
    const progressContainer = document.getElementById('progress-container');
    const progressBar = document.getElementById('progress-bar');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    const totalCountSpan = document.getElementById('total-count');

    const btnPlay = document.getElementById('btn-play');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnLoop = document.getElementById('btn-loop');
    const iconPlay = document.getElementById('icon-play');
    const iconPause = document.getElementById('icon-pause');

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "0:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' : ''}${sec}`;
    }

    function togglePlayIcon(isPlaying) {
      if(isPlaying) {
        iconPlay.classList.add('hidden');
        iconPause.classList.remove('hidden');
      } else {
        iconPlay.classList.remove('hidden');
        iconPause.classList.add('hidden');
      }
    }

    btnPlay.addEventListener('click', () => {
      if (!mainAudio.src || mainAudio.src.endsWith(window.location.pathname)) return; 
      if (mainAudio.paused) { mainAudio.play(); togglePlayIcon(true); } 
      else { mainAudio.pause(); togglePlayIcon(false); }
    });

    btnNext.addEventListener('click', () => playNextTrack());
    btnPrev.addEventListener('click', () => playPrevTrack());
    btnLoop.addEventListener('click', () => btnLoop.classList.toggle('active-loop'));

    function playNextTrack() {
      if (currentPlaylist.length === 0) return;
      let nextIndex = currentTrackIndex + 1;
      if (nextIndex >= currentPlaylist.length) {
        if (btnLoop.classList.contains('active-loop')) { nextIndex = 0; } 
        else { return; } 
      }
      playTrack(currentPlaylist[nextIndex], nextIndex, currentPlaylist);
    }

    function playPrevTrack() {
      if (currentPlaylist.length === 0) return;
      if (mainAudio.currentTime > 3) { mainAudio.currentTime = 0; return; } 
      let prevIndex = currentTrackIndex - 1;
      if (prevIndex < 0) prevIndex = 0;
      playTrack(currentPlaylist[prevIndex], prevIndex, currentPlaylist);
    }

    mainAudio.addEventListener('ended', () => {
      if (btnLoop.classList.contains('active-loop') && currentPlaylist.length === 1) {
        mainAudio.currentTime = 0; mainAudio.play(); 
      } else {
        playNextTrack(); 
      }
    });

    mainAudio.addEventListener('timeupdate', () => {
      if (mainAudio.duration) {
        const percent = (mainAudio.currentTime / mainAudio.duration) * 100;
        progressBar.style.width = `${percent}%`;
        timeCurrent.innerText = formatTime(mainAudio.currentTime);
        timeTotal.innerText = formatTime(mainAudio.duration);
      }
    });

    progressContainer.addEventListener('click', (e) => {
      if (mainAudio.duration) {
        const rect = progressContainer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const percent = clickX / rect.width;
        mainAudio.currentTime = percent * mainAudio.duration;
      }
    });

    window.onload = async () => {
      if (accessToken) { authOverlay.classList.add('hidden'); initApp(); }

      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/drive.readonly',
        callback: (response) => {
          if (response.access_token) {
            accessToken = response.access_token;
            localStorage.setItem('mmok_token', accessToken);
            authOverlay.classList.add('hidden');
            initApp();
          }
        },
      });
    };

    document.getElementById('login-btn').addEventListener('click', () => tokenClient.requestAccessToken({ prompt: 'consent' }));

    document.getElementById('force-scan-btn').addEventListener('click', async () => {
      if (!accessToken) return;
      document.getElementById('force-scan-btn').innerText = "⏳ Fusion...";
      await db.tracks.clear(); await db.syncState.delete('last_page_token');
      await runFullScan();
      document.getElementById('force-scan-btn').innerText = "🔄 Actualiser Bibliothèque";
    });

    async function initApp() {
      const count = await db.tracks.count();
      syncStatus.innerHTML = `<span style="color: var(--neon-rose)">${count.toLocaleString('fr-FR')} titres en mémoire</span>`;
      if (count > 0) totalCountSpan.innerText = `(${count.toLocaleString('fr-FR')})`; 
    }

    function setActiveNav(element) {
      [navHome, navAll, navAlbums, navArtists].forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      homeContainer.classList.add('hidden'); tableContainer.classList.add('hidden'); gridContainer.classList.add('hidden');
    }

    navHome.addEventListener('click', () => { setActiveNav(navHome); viewTitle.innerText = "Lecteur"; homeContainer.classList.remove('hidden'); });
    goToHomeBtn.addEventListener('click', () => navHome.click());
    navAll.addEventListener('click', () => { setActiveNav(navAll); searchBar.value = ""; viewTitle.innerText = "Bibliothèque"; displayLibrary(); });
    navAlbums.addEventListener('click', () => { setActiveNav(navAlbums); searchBar.value = ""; viewTitle.innerText = "Vos Albums"; displayAlbums(); });
    navArtists.addEventListener('click', () => { setActiveNav(navArtists); searchBar.value = ""; viewTitle.innerText = "Vos Artistes"; displayArtists(); });

    async function playTrack(track, index, playlist) {
      currentPlaylist = playlist;
      currentTrackIndex = index;
      
      navHome.click(); 
      togglePlayIcon(false); 
      
      homeTitle.innerText = "Chargement...";
      homeArtistAlbum.innerText = "Téléchargement sécurisé...";
      homeArtistAlbum.classList.add('loading-pulse');
      bottomTitle.innerText = "Chargement...";
      bottomArtist.innerText = "Patiente...";

      const coverUrl = track.cover ? `url('${track.cover.replace(/\\/g, '/')}')` : 'none';
      bottomCover.style.backgroundImage = coverUrl;
      homeCover.style.backgroundImage = coverUrl;

      document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
      const activeRow = document.getElementById(`track-row-${track.id}`);
      if(activeRow) activeRow.classList.add('playing');

      try {
        const response = await fetch(`https://www.googleapis.com/drive/v3/files/${track.driveFileId}?alt=media`, {
          headers: { 'Authorization': `Bearer ${accessToken}` }
        });

        if (response.status === 401 || response.status === 403) {
          alert("Session expirée. Reconnexion en cours.");
          localStorage.removeItem('mmok_token'); window.location.reload(); return;
        }
        if (!response.ok) throw new Error("Fichier introuvable");

        const audioBlob = await response.blob();
        if (mainAudio.src && mainAudio.src.startsWith('blob:')) URL.revokeObjectURL(mainAudio.src);

        mainAudio.src = URL.createObjectURL(audioBlob);
        
        homeTitle.innerText = track.title;
        homeArtistAlbum.innerText = `${track.artist} • ${track.album}`;
        homeArtistAlbum.classList.remove('loading-pulse');
        bottomTitle.innerText = track.title;
        bottomArtist.innerText = `${track.artist} - ${track.album}`;

        mainAudio.play()
          .then(() => togglePlayIcon(true)) 
          .catch(e => console.error("Erreur lecture:", e));
      } catch (e) {
        console.error(e);
        homeTitle.innerText = "Erreur";
        homeArtistAlbum.innerText = "Impossible de lire le fichier.";
        homeArtistAlbum.classList.remove('loading-pulse');
      }
    }

    async function displayLibrary(searchTerm = "", filterKey = null, filterValue = null) {
      tableContainer.classList.remove('hidden');
      let tracks = await db.tracks.toArray();

      if (filterKey && filterValue) tracks = tracks.filter(t => t[filterKey] === filterValue);
      else if (searchTerm.trim() !== "") {
        tracks = tracks.filter(t => (t.title && t.title.toLowerCase().includes(searchTerm)) || (t.artist && t.artist.toLowerCase().includes(searchTerm)) || (t.album && t.album.toLowerCase().includes(searchTerm)));
      }

      const tracksToDisplay = tracks.slice(0, 200); 
      trackTableBody.innerHTML = '';

      if (tracksToDisplay.length === 0) { trackTableBody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 40px; color:#666;">Aucun résultat.</td></tr>'; return; }

      tracksToDisplay.forEach((track, index) => {
        const tr = document.createElement('tr');
        tr.className = 'track-item';
        tr.id = `track-row-${track.id}`; 
        
        if (track.id === (currentPlaylist[currentTrackIndex]?.id)) tr.classList.add('playing');

        const coverStyle = track.cover ? `background-image: url('${track.cover.replace(/\\/g, '/')}');` : '';
        tr.innerHTML = `<td class="cover-cell"><div class="mini-cover" style="${coverStyle}"></div></td><td class="title-cell">${track.title}</td><td class="artist-cell">${track.artist} - ${track.album}</td>`;
        
        tr.onclick = () => { playTrack(track, index, tracksToDisplay); };
        trackTableBody.appendChild(tr);
      });
    }

    async function displayAlbums() {
      gridContainer.classList.remove('hidden'); gridContainer.innerHTML = '';
      const tracks = await db.tracks.toArray(); const albumsMap = {};
      tracks.forEach(t => { if (!albumsMap[t.album]) albumsMap[t.album] = { count: 0, cover: t.cover }; albumsMap[t.album].count++; });

      Object.keys(albumsMap).sort().forEach(albumName => {
        const card = document.createElement('div'); card.className = 'grid-card';
        const coverArt = albumsMap[albumName].cover ? `<div style="width:100%; height:120px; background-image:url('${albumsMap[albumName].cover.replace(/\\/g, '/')}'); background-size:cover; background-position:center; border-radius:4px; margin-bottom:10px;"></div>` : `<span class="grid-icon">💿</span>`;
        card.innerHTML = `${coverArt}<div class="grid-title" title="${albumName}">${albumName}</div><div class="grid-subtitle">${albumsMap[albumName].count} titre(s)</div>`;
        card.onclick = () => { setActiveNav(navAll); viewTitle.innerText = `Album : ${albumName}`; displayLibrary("", "album", albumName); };
        gridContainer.appendChild(card);
      });
    }

    async function displayArtists() {
      gridContainer.classList.remove('hidden'); gridContainer.innerHTML = '';
      const tracks = await db.tracks.toArray(); const artistsMap = {};
      tracks.forEach(t => { if (!artistsMap[t.artist]) artistsMap[t.artist] = 0; artistsMap[t.artist]++; });

      Object.keys(artistsMap).sort().forEach(artistName => {
        const card = document.createElement('div'); card.className = 'grid-card';
        card.innerHTML = `<span class="grid-icon">🎤</span><div class="grid-title" title="${artistName}">${artistName}</div><div class="grid-subtitle">${artistsMap[artistName]} titre(s)</div>`;
        card.onclick = () => { setActiveNav(navAll); viewTitle.innerText = `Artiste : ${artistName}`; displayLibrary("", "artist", artistName); };
        gridContainer.appendChild(card);
      });
    }

    let searchTimeout;
    searchBar.addEventListener('input', (e) => {
      clearTimeout(searchTimeout); setActiveNav(navAll); viewTitle.innerText = "Recherche...";
      searchTimeout = setTimeout(() => displayLibrary(e.target.value.toLowerCase()), 300);
    });

    async function runFullScan() {
      let catalogueLocal = {};
      try { const res = await fetch('./catalogue.json'); catalogueLocal = await res.json(); } catch (e) { alert("⚠️ Fichier catalogue.json introuvable."); return; }
      let pageToken = (await db.syncState.get('last_page_token'))?.value || null;

      try {
        do {
          let url = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent("mimeType contains 'audio/' and trashed = false")}&fields=nextPageToken,files(id,name)&pageSize=1000`;
          if (pageToken) url += `&pageToken=${pageToken}`;
          const response = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
          if (response.status === 401) { localStorage.removeItem('mmok_token'); window.location.reload(); return; }
          
          const data = await response.json();
          if (data.files && data.files.length > 0) {
            const tracksToSave = data.files.map(f => {
              const metaData = catalogueLocal[f.name];
              if (metaData) return { id: f.id, title: metaData.title, artist: metaData.artist, album: metaData.album, cover: metaData.cover, driveFileId: f.id };
              return { id: f.id, title: f.name.replace(/\.[^/.]+$/, ""), artist: "Inconnu", album: "Inconnu", cover: null, driveFileId: f.id };
            });
            await db.tracks.bulkPut(tracksToSave);
            syncStatus.innerHTML = `<span style="color: var(--neon-indigo)">Fusion... ${await db.tracks.count()} traités</span>`;
          }
          pageToken = data.nextPageToken;
          if (pageToken) await db.syncState.put({ key: 'last_page_token', value: pageToken }); else await db.syncState.delete('last_page_token');
        } while (pageToken);
        
        const finalCount = await db.tracks.count();
        syncStatus.innerHTML = `<span style="color: var(--neon-rose)">${finalCount.toLocaleString('fr-FR')} titres prêts</span>`;
        if (finalCount > 0) totalCountSpan.innerText = `(${finalCount.toLocaleString('fr-FR')})`;
      } catch (e) { console.error("Erreur scan", e); }
    }
  </script>
</body>
